service: flashcart-backend
frameworkVersion: '3'
useDotenv: true

plugins:
  - serverless-plugin-typescript
  - serverless-offline

provider:
  name:    aws
  runtime: nodejs20.x
  region:  us-east-1
  stage:   ${opt:stage, 'dev'}
  environment:
    STAGE:              ${self:provider.stage}
    PRODUCTS_TABLE:     flashcart-products-${self:provider.stage}
    USERS_TABLE:        flashcart-users-${self:provider.stage}
    ORDERS_TABLE:       flashcart-orders-${self:provider.stage}
    BEDROCK_MODEL_ID:   ${env:BEDROCK_MODEL_ID, 'anthropic.claude-3-5-sonnet-20240620-v1:0'}
    LEX_BOT_ID:         ${env:LEX_BOT_ID, 'PLACEHOLDER'}
    LEX_BOT_ALIAS_ID:   ${env:LEX_BOT_ALIAS_ID, 'PLACEHOLDER'}
    LEX_LOCALE_ID:      en_US
    COGNITO_CLIENT_ID:    ${env:COGNITO_CLIENT_ID}
    COGNITO_REGION:       ${self:provider.region}
    COGNITO_USER_POOL_ARN: ${env:COGNITO_USER_POOL_ARN}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - arn:aws:dynamodb:${self:provider.region}:*:table/flashcart-*
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource: '*'
        - Effect: Allow
          Action:
            - rekognition:DetectLabels
            - rekognition:SearchProductsByImage
          Resource: '*'
        - Effect: Allow
          Action:
            - lex:RecognizeUtterance
            - lex:RecognizeText
          Resource: '*'

functions:
  signInWithPhone:
    handler: functions/auth.signInWithPhone
    events:
      - http: { path: /auth/signin/phone, method: post, cors: true }

  verifyPhoneOtp:
    handler: functions/auth.verifyPhoneOtp
    events:
      - http: { path: /auth/verify/otp, method: post, cors: true }

  intentRouter:
    handler: functions/intentRouter.handler
    events:
      - http:
          path: /intent
          method: post
          cors: true
  voiceProcessor:
    handler: functions/voiceProcessor.handler
    timeout: 30
    events:
      - http:
          path: /voice/process
          method: post
          cors: true
  snapProcessor:
    handler: functions/snapProcessor.handler
    timeout: 30
    events:
      - http:
          path: /snap/process
          method: post
          cors: true
  predictCartEngine:
    handler: functions/predictCartEngine.handler
    timeout: 30
    events:
      - http:
          path: /predict/cart
          method: get
          cors: true
  contextClassifier:
    handler: functions/contextClassifier.handler
    events:
      - http:
          path: /context/classify
          method: post
          cors: true
  checkoutAssembler:
    handler: functions/checkoutAssembler.handler
    events:
      - http:
          path: /checkout/assemble
          method: post
          cors: true
  substitutionEngine:
    handler: functions/substitutionEngine.handler
    events:
      - http:
          path: "/products/{asin}/substitute"
          method: get
          cors: true
  orderPlacer:
    handler: functions/orderPlacer.handler
    timeout: 15
    events:
      - http:
          path: /orders
          method: post
          cors: true
resources:
  Resources:
    ProductsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: flashcart-products-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - { AttributeName: id,       AttributeType: S }
          - { AttributeName: category, AttributeType: S }
        KeySchema:
          - { AttributeName: id, KeyType: HASH }
        GlobalSecondaryIndexes:
          - IndexName: category-index
            KeySchema:
              - { AttributeName: category, KeyType: HASH }
            Projection: { ProjectionType: ALL }

    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: flashcart-users-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - { AttributeName: id, AttributeType: S }
        KeySchema:
          - { AttributeName: id, KeyType: HASH }

    OrdersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: flashcart-orders-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - { AttributeName: id,     AttributeType: S }
          - { AttributeName: userId, AttributeType: S }
        KeySchema:
          - { AttributeName: id, KeyType: HASH }
        GlobalSecondaryIndexes:
          - IndexName: userId-index
            KeySchema:
              - { AttributeName: userId, KeyType: HASH }
            Projection: { ProjectionType: ALL }

custom:
  serverless-offline:
    httpPort: 4000
    noPrependStageInUrl: true
